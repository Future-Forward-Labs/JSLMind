apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cbm-isolation-forest
  title: "CBM Anomaly Detector — Isolation Forest"
  description: >
    Custom ML model for Condition-Based Maintenance. Detects anomalies in
    PLC sensor streams (temperature, vibration, current, pressure, RPM)
    using 30-second hopping windows and Z-score scoring inside
    KafkaStreamsAnomalyProcessor. Triggers Temporal CBMWorkflow when
    anomaly score exceeds threshold. Trained on 90 days of synthetic
    JSL Plant 1 sensor history.
  tags: [ml-model, cbm, anomaly-detection, sklearn, kafka-streams, plant-1]
  annotations:
    mlflow/model-name: cbm-isolation-forest
    mlflow/stage: Production
    mlflow/registry: "http://mlflow:5000"
    serving/endpoint: "http://bentoml:3000/cbm/predict"
    monitoring/evidently: "http://evidently:8080/projects/cbm"
    demo/retraining: "weekly Airflow DAG on new sensor data"
spec:
  type: ml-model
  model_type: ml-model
  lifecycle: production
  owner: maintenance-team
  system: jslmind-platform
  framework: scikit-learn
  algorithm: IsolationForest
  serving: bentoml
  inputs:
    - name: temperature_C
      type: float
    - name: vibration_mm_s
      type: float
    - name: current_A
      type: float
    - name: pressure_bar
      type: float
    - name: rpm
      type: float
  output: anomaly_score (0.0–1.0)
  eval_metrics:
    precision: 0.94
    recall: 0.91
    f1: 0.925
  training_data: "Silver.sensor_history Jan–Mar 2026 (90 days, 3 equipment units)"
  last_retrained: "2026-02-15"
  drift_threshold: 0.15
  retraining_trigger: "weekly-airflow-dag + Evidently drift alert"
