# ─────────────────────────────────────────────────────────────────────────────
# JSLMind Demo Platform — Docker Compose
# Services are grouped by phase. Start only the phases you need.
# Usage:
#   Phase 1 only:  docker compose up -d postgres redis keycloak prometheus grafana
#   All phases:    docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  ollama_models:
  qdrant_data:
  minio_data:
  airflow_logs:
  medallion_data:
  timescaledb_data:

networks:
  jslmind:
    driver: bridge

# ─── Phase 1: Platform Foundation ─────────────────────────────────────────────
services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jslmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/01-init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    ports:
      - "5432:5432"
    networks: [jslmind]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [jslmind]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [jslmind]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks: [jslmind]
    depends_on: [prometheus]
    restart: unless-stopped

# ─── Phase 2: LLM Gateway ─────────────────────────────────────────────────────

  ollama:
    build:
      context: ./infra
      dockerfile: Dockerfile.ollama
    platform: linux/arm64   # Apple Silicon; remove on x86
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    networks: [jslmind]
    restart: unless-stopped

  litellm-proxy:
    build:
      context: ./infra
      dockerfile: Dockerfile.litellm
    command: --config /app/config/litellm_config.yaml --port 4000 --detailed_debug
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse-server:3000
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./gateway/litellm_config.yaml:/app/config/litellm_config.yaml:ro
    ports:
      - "4000:4000"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  langfuse-server:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3002
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3002:3000"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:2
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
    networks: [jslmind]
    depends_on: [langfuse-server]
    restart: unless-stopped

# ─── Phase 3: Agent Catalog ───────────────────────────────────────────────────

  backstage:
    image: ghcr.io/backstage/backstage:latest
    environment:
      APP_CONFIG_app_baseUrl: http://localhost:7007
      APP_CONFIG_backend_baseUrl: http://localhost:7007
      APP_CONFIG_backend_database_client: pg
      APP_CONFIG_backend_database_connection_host: postgres
      APP_CONFIG_backend_database_connection_database: backstage
      APP_CONFIG_backend_database_connection_user: postgres
      APP_CONFIG_backend_database_connection_password: ${POSTGRES_PASSWORD}
    volumes:
      - ./catalog:/catalog:ro
      - ./infra/backstage/app-config.yaml:/app/app-config.production.yaml:ro
    ports:
      - "7007:7007"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ─── Phase 4: Medallion Data Pipeline ────────────────────────────────────────

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [jslmind]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.9.0
    command: >-
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname JSL --role Admin --email admin@jsl.com || true"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      OPENLINEAGE_URL: http://marquez:5000
      OPENLINEAGE_NAMESPACE: jslmind
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-duckdb==1.8.1 minio==7.2.0 pandas==2.2.0 pyarrow==15.0.0"
      # Corporate proxy intercepts HTTPS — bypass SSL verification for pip installs
      PIP_TRUSTED_HOST: "pypi.org files.pythonhosted.org pypi.python.org"
      PIP_NO_VERIFY: "1"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.0
    command: webserver
    environment: *airflow-env
    volumes:
      - ./data-platform/dags:/opt/airflow/dags:ro
      - ./data-platform/dbt:/opt/airflow/dbt
      - airflow_logs:/opt/airflow/logs
      - medallion_data:/opt/airflow/medallion
    ports:
      - "8085:8080"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.0
    command: scheduler
    environment: *airflow-env
    volumes:
      - ./data-platform/dags:/opt/airflow/dags:ro
      - ./data-platform/dbt:/opt/airflow/dbt
      - airflow_logs:/opt/airflow/logs
      - medallion_data:/opt/airflow/medallion
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  marquez:
    image: marquezproject/marquez:0.50.0
    platform: linux/amd64
    environment:
      MARQUEZ_CONFIG: /marquez.yml
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infra/marquez/marquez.yml:/marquez.yml:ro
    ports:
      - "5000:5000"
      - "5001:5001"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    platform: linux/amd64
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: "5000"
      WEB_PORT: "8080"
    ports:
      - "3003:8080"
    networks: [jslmind]
    depends_on:
      - marquez
    restart: unless-stopped

  camel-integration:
    build:
      context: ./integration
      dockerfile: Dockerfile
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      RAG_INGEST_URL: http://rag-service:8001/ingest
      RAG_WATCH_DIR: /docs/incoming
      SPRING_PROFILES_ACTIVE: demo
      TIMESCALEDB_HOST: timescaledb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TEMPORAL_ADDRESS: temporal:7233
    volumes:
      - ./rag/docs:/docs          # shared with rag-service; Camel watches /docs/incoming
    ports:
      - "8090:8080"
    networks: [jslmind]
    depends_on:
      minio:
        condition: service_healthy
      rag-service:
        condition: service_started
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

# ─── Phase 5: OT/CBM Streaming ───────────────────────────────────────────────

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --overprovisioned
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092"
    ports:
      - "9092:9092"
      - "9644:9644"
    networks: [jslmind]
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24.2
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.26.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"
    networks: [jslmind]
    depends_on: [temporal]
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sensors
    volumes:
      - ./infra/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks: [jslmind]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sensors"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    networks: [jslmind]
    restart: unless-stopped

  mqtt-simulator:
    build:
      context: ./ot/mqtt-simulator
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      PUBLISH_RATE_HZ: "1"
      ANOMALY_SIGNAL_PORT: "8099"
    ports:
      - "8099:8099"
    networks: [jslmind]
    depends_on: [mosquitto]
    restart: unless-stopped

  pyflink-anomaly:
    build:
      context: ./ot/pyflink-consumer
    environment:
      REDPANDA_BROKERS: redpanda:29092
      TEMPORAL_ADDRESS: temporal:7233
      LITELLM_BASE_URL: http://litellm-proxy:4000
    networks: [jslmind]
    depends_on: [redpanda, temporal]
    restart: unless-stopped

  cbm-worker:
    build:
      context: ./workflows
      dockerfile: Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      LITELLM_BASE_URL: http://litellm-proxy:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
    networks: [jslmind]
    depends_on: [temporal]
    restart: unless-stopped

# ─── Phase 6: Hybrid RAG ──────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:v1.9.1
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks: [jslmind]
    restart: unless-stopped

  rag-service:
    build:
      context: ./rag
    environment:
      QDRANT_URL: http://qdrant:6333
      LITELLM_BASE_URL: http://litellm-proxy:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      EMBED_MODEL: jsl-embed
      GENERATE_MODEL: jsl-quality
      DOC_WATCH_DIR: /docs/incoming
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      TIMESCALEDB_DSN: host=timescaledb port=5432 dbname=sensors user=postgres password=${POSTGRES_PASSWORD}
    volumes:
      - ./rag/docs:/docs
    ports:
      - "8001:8001"
    networks: [jslmind]
    depends_on: [qdrant, litellm-proxy]
    restart: unless-stopped

# ─── Phase 7: Self-Serve Agent Builder ───────────────────────────────────────

  dify:
    image: langgenius/dify-api:0.6.14
    environment: &dify-env
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OPENAI_API_BASE: http://litellm-proxy:4000
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
    ports:
      - "5001:5001"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dify-web:
    image: langgenius/dify-web:0.6.14
    environment:
      CONSOLE_API_URL: http://localhost:5001
    ports:
      - "3003:3000"
    networks: [jslmind]
    restart: unless-stopped

  dify-worker:
    image: langgenius/dify-api:0.6.14
    command: celery -A app.celery worker -P gevent -c 1 --loglevel INFO
    environment: *dify-env
    networks: [jslmind]
    depends_on: [dify]
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:1.47.1
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678/
    ports:
      - "5678:5678"
    networks: [jslmind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  langgraph-service:
    build:
      context: ./agents
    environment:
      LITELLM_BASE_URL: http://litellm-proxy:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      TEMPORAL_ADDRESS: temporal:7233
      RAG_BASE_URL: http://rag-service:8001
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
    ports:
      - "8000:8000"
    networks: [jslmind]
    restart: unless-stopped

# ─── Phase 8: Unified UI + Kong ───────────────────────────────────────────────

  kong:
    image: kong/kong-gateway:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yaml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./gateway/kong/kong.yaml:/kong/kong.yaml:ro
    ports:
      - "8000:8000"
      - "8002:8001"
    networks: [jslmind]
    restart: unless-stopped

  fastapi-backend:
    build:
      context: ./backend
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      LITELLM_BASE_URL: http://litellm-proxy:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      RAG_BASE_URL: http://rag-service:8001
      MQTT_SIMULATOR_URL: http://mqtt-simulator:8099
      CATALOG_DIR: /catalog
      REDPANDA_BROKERS: redpanda:29092
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
    volumes:
      - ./catalog:/catalog
    ports:
      - "8003:8003"
    networks: [jslmind]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
        VITE_LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
        VITE_LITELLM_KEY: ${LITELLM_MASTER_KEY}
    ports:
      - "3000:80"
    networks: [jslmind]
    restart: unless-stopped
