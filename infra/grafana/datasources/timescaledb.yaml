apiVersion: 1
datasources:
  - name: TimescaleDB
    type: postgres
    uid: timescaledb-uid
    url: timescaledb:5432
    database: sensors
    user: postgres
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: false
    editable: false
