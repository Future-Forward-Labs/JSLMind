server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — required for runtime upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Service health-check proxies (avoids browser CORS errors)
    location /proxy/rag/ {
        set $upstream http://rag-service:8001;
        rewrite ^/proxy/rag/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/qdrant/ {
        set $upstream http://qdrant:6333;
        rewrite ^/proxy/qdrant/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/camel/ {
        set $upstream http://camel-integration:8080;
        rewrite ^/proxy/camel/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/backstage/ {
        set $upstream http://backstage:7007;
        rewrite ^/proxy/backstage/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/litellm/ {
        set $upstream http://litellm-proxy:4000;
        rewrite ^/proxy/litellm/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/langfuse/ {
        set $upstream http://langfuse-server:3000;
        rewrite ^/proxy/langfuse/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/grafana/ {
        set $upstream http://grafana:3000;
        rewrite ^/proxy/grafana/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/minio/ {
        set $upstream http://minio:9000;
        rewrite ^/proxy/minio/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/kong/ {
        set $upstream http://kong:8001;
        rewrite ^/proxy/kong/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/keycloak/ {
        set $upstream http://keycloak:8080;
        rewrite ^/proxy/keycloak/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/airflow/ {
        set $upstream http://airflow-webserver:8080;
        rewrite ^/proxy/airflow/(.*) /$1 break;
        proxy_pass $upstream;
    }
    location /proxy/marquez/ {
        set $upstream http://marquez:5000;
        rewrite ^/proxy/marquez/(.*) /$1 break;
        proxy_pass $upstream;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
